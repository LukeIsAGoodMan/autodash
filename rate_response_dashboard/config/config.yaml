# All paths and behavior knobs live here. Keep code path-free.

paths:
  # SAS server writes exp_<MMMYY>_rollup.csv here. This is what SAS sees:
  # a Unix path the SAS session has write access to. Used only to compute
  # the &folder. macro variable handed to SAS.
  sas_export_dir: "/sasdata/windows/fnbmcorp/Risk/Modeling/Model Development/Vendor Engagements/Active/01 - Adhoc/2026Q2_RR_Anlaysis/FilterCRS"
  # Python scans this for exp_*_rollup.csv. On Windows this is the UNC path
  # to the SAME physical folder SAS writes to. Yaml single quotes preserve
  # backslashes literally.
  rollup_csv_dir: '\\fnbm.corp\share\Risk\Modeling\Model Development\Vendor Engagements\Active\01 - Adhoc\2026Q2_RR_Anlaysis\FilterCRS'
  mart_dir: "./data/mart/rate_response_rollup"
  # Decile marts (P4): scorecard-level (10 deciles per scorecard) and
  # portfolio-level (20 deciles across all customers).
  decile_sc_mart_dir:   "./data/mart/decile_sc"
  decile_port_mart_dir: "./data/mart/decile_port"
  logs_dir: "./data/logs"
  sas_pipeline_file: "./sas/rate_response_pipeline.sas"

# SAS Agora connector wrapper. The actual import path lives in src/sas_runner.py
# because it depends on the company library; we only carry behavior knobs here.
sas:
  trm_libname: "trm"
  trm_libpath: "/sasdata/area51/group/RISK_MODELING/TRM/Analysis2026Q2"
  # The &folder. macro var the SAS pipeline expects (so we don't hardcode it
  # inside the .sas file).
  export_folder_macrovar: "/sasdata/windows/fnbmcorp/Risk/Modeling/Model Development/Vendor Engagements/Active/01 - Adhoc/2026Q2_RR_Anlaysis/FilterCRS"

refresh:
  # Recent months always re-pulled because response/board are still maturing.
  recent_refresh_window_months: 3
  # Hard cutoff: do not auto-refresh anything older than this.
  history_freeze_months: 24

mart:
  # Columns the rollup CSV MUST have for the partition to be accepted.
  required_columns:
    - Prospect_type
    - pqabandon_flag
    - prchargeoff_flag
    - prclosure_flag
    - prdecline_flag
    - vs_band
    - annual_fee
    - times_mailed_12mo_cnt
    - trm10_tier
    - scorecard
    - rm_flag
    - volume
    - responders
    - expected_responses
    - Boards

  # Columns that MAY be missing from the rollup CSV. If absent, Python fills
  # the column with the specified default at ingest time. Dashboard metrics
  # that depend on these columns will then show null (—) for those months.
  #
  # expected_responses_xpm is here because the current SAS pipeline references
  # sum(EXP_RESPONSE_SCORE) but EXP_RESPONSE_SCORE is not in the
  # readmailfile_trm keep= list, so proc export silently drops the column.
  # Until SAS sources EXP_RESPONSE_SCORE, expected_rr_xpm and
  # actual_vs_expected_xpm will be unreliable for affected months. See the
  # has_xpm column in validation_summary.csv / Data Quality tab.
  optional_columns:
    expected_responses_xpm: null

  # SAS-side rate columns we intentionally DROP at ingest time so dashboard
  # cannot accidentally average them. Rates must be recomputed from sums.
  drop_precomputed_rate_columns:
    - GRR
    - NRR

  # Decile rollup schemas. Both share volume/responders/Boards + a `decile`
  # bin; the scorecard-level rollup also carries a `scorecard` dimension.
  decile_sc_required_columns:
    - scorecard
    - decile
    - volume
    - responders
    - Boards
  decile_port_required_columns:
    - decile
    - volume
    - responders
    - Boards

  # A campaign-month partition is 'full' when its SAS rerun finished at
  # least this many months after the end of the campaign month. Before that
  # it's 'partial' — responders and boards are still arriving from the
  # offer drop. Maturity is taken from the latest source_modified_time in
  # load_log.csv for that campaign_month, falling back to partition mtime
  # if no load_log entry exists.
  maturity_threshold_months: 3

dashboard:
  title: "Rate Response Dashboard"
  # Suppress cells where volume < this. Set to 0 to disable.
  small_cell_threshold: 100
  # Default dimensions/metrics shown in pivot tab.
  default_row_dim: "vs_band"
  default_metric: "actual_board_rate"
  # When the campaign-month filter is empty, charts/tables auto-restrict to
  # the most recent N months. User can still override by selecting specific
  # months in the dropdown. Set very large (e.g. 999) to disable.
  default_lookback_months: 24

# Catalog of dimensions and metrics exposed in the UI. Order matters.
catalog:
  dimensions:
    - vs_band
    - scorecard
    - Prospect_type
    - rm_flag
    - trm10_tier
    - annual_fee
    - times_mailed_12mo_cnt
    - pqabandon_flag
    - prchargeoff_flag
    - prclosure_flag
    - prdecline_flag

  metrics:
    - volume
    - responders
    - Boards
    - actual_board_rate       # primary headline rate
    - actual_response_rate
    - expected_rr_trm
    - expected_rr_xpm
    - actual_vs_expected_trm
    - actual_vs_expected_xpm

logging:
  level: "INFO"
  file: "./data/logs/app.log"

# AI Report Generator. See src/ai_agent/.
ai_agent:
  # Stage 2 LLM commentary. Provider is swapped per environment:
  #   • Mac dev: provider=openai, OPENAI_API_KEY env
  #   • Company: provider=gemini once Enterprise access is provisioned
  #   • CI / offline: provider=stub (no network, no spend)
  llm:
    provider: stub             # stub | openai | gemini
    model: gpt-4o
    api_key_env: OPENAI_API_KEY
    timeout_seconds: 30
    # When true, commentary is generated and embedded in the report.
    # When false, the LLM step is skipped entirely and chart placeholders
    # show the "Commentary will appear here in Stage 2" stub.
    enabled: true


  # How many of the most recent months to render charts for. The full mart
  # is still scanned (for biggest movers etc.), but charts truncate to
  # avoid unreadably crowded x-axes.
  chart_lookback_months: 15

  # Big Mac cohort definition. The "Big Mac" is the most-targeted prospecting
  # subset of the mail file and is the natural baseline for measuring true
  # rate response change without expansion / remail confounds.
  # All conditions are AND-ed together. Adjust here when the cohort definition
  # changes — the report module reads this at runtime.
  big_mac:
    Prospect_type: "Prospecting"
    rm_flag: 0
    times_mailed_12mo_cnt: 0
    trm10_tier_in: [1, 21]
    # The single dim Big Mac drills into for "which slice moved most".
    drill_dim: "vs_band"

  # Dims surfaced in slice-trend section. Order = render order.
  slice_dims:
    - annual_fee
    - vs_band
    - scorecard
    - Prospect_type
    - rm_flag
    - times_mailed_12mo_cnt

  # Section D — top combination movers. Each pair listed is enumerated as a
  # 2-way drill (dim_A × dim_B), MoM NRR computed per cell, and the largest
  # absolute movers are surfaced. Cells with volume below `min_combo_volume`
  # in either month are dropped (noise floor).
  combinations:
    dim_pairs:
      - [annual_fee, vs_band]
      - [annual_fee, Prospect_type]
      - [annual_fee, times_mailed_12mo_cnt]
      - [vs_band, Prospect_type]
      - [vs_band, times_mailed_12mo_cnt]
      - [Prospect_type, times_mailed_12mo_cnt]
    min_combo_volume: 5000        # higher than small_cell — combos are smaller
    top_k: 8                      # surface top 8 gainers + top 8 losers
